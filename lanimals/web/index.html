<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,interactive-widget=resizes-content">
  <meta name="theme-color" content="#f6a84b">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1f1b18">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='44' text-anchor='middle' dominant-baseline='central' font-size='86'%3E%F0%9F%90%B1%3C/text%3E%3C/svg%3E">
  <title>LANimals</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="shell">
    <section id="login-view" class="login-card">
      <div class="logo" aria-hidden="true">🐱</div>
      <h1>LANimals</h1>
      <p class="subtitle" data-i18n="app.subtitle"></p>
      <form id="login-form">
        <label for="password" data-i18n="login.passwordLabel"></label>
        <input id="password" name="password" type="password" autocomplete="current-password" required autofocus data-i18n-placeholder="login.passwordPlaceholder">
        <label class="switch-row">
          <input id="incognito" type="checkbox">
          <span data-i18n="login.incognito"></span>
        </label>
        <p class="hint" data-i18n="login.incognitoHint"></p>
        <button type="submit" data-i18n="login.enter"></button>
        <p id="login-error" class="error" role="alert"></p>
      </form>
    </section>

    <section id="chat-view" class="chat" hidden>
      <header class="chat-header">
        <div>
          <div class="brand-row">
            <h1>LANimals</h1>
            <span id="connection" class="status offline" role="status" data-i18n-aria-label="chat.connecting"></span>
          </div>
          <p id="identity" data-i18n="chat.identifying"></p>
        </div>
      </header>

      <div id="messages" class="messages" aria-live="polite">
        <div id="empty-state" class="empty">
          <span aria-hidden="true">🐾</span>
          <p data-i18n="empty.message"></p>
        </div>
      </div>
      <div id="messages-scrollbar" class="messages-scrollbar" aria-hidden="true" hidden>
        <div id="messages-scrollbar-thumb" class="messages-scrollbar-thumb"></div>
      </div>
      <button id="new-messages-button" class="new-messages-button" type="button" hidden>
        <span id="new-messages-label"></span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m7 10 5 5 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <footer id="drop-zone" class="composer">
        <form id="message-form" class="composer-bubble">
          <div id="file-preview" class="file-preview" hidden></div>
          <div id="attachment-status" class="attachment-status" role="status" aria-live="polite" hidden>
            <div class="attachment-status-row">
              <span id="upload-status"></span>
              <span id="upload-progress-label" class="upload-progress-label" hidden></span>
              <button id="cancel-upload" class="cancel-upload" type="button" data-i18n-title="upload.cancel" data-i18n-aria-label="upload.cancel" hidden>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M7 7l10 10M17 7 7 17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </button>
              <button id="retry-upload" class="retry-upload" type="button" data-i18n="upload.retry" hidden></button>
            </div>
            <div id="upload-progress" class="attachment-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" hidden>
              <span id="upload-progress-bar" class="attachment-progress-bar"></span>
            </div>
          </div>
          <textarea id="message-input" rows="1" maxlength="4000" data-i18n-placeholder="composer.placeholder"></textarea>
          <button id="expand-composer" class="expand-button" type="button" data-i18n-title="composer.expand" data-i18n-aria-label="composer.expand" aria-expanded="false">
            <svg class="expand-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path class="expand-glyph" d="M13 6h5v5M11 18H6v-5" fill="none" stroke="currentColor" stroke-width="2.2"/>
              <path class="collapse-glyph" d="M14 5v5h5M10 19v-5H5" fill="none" stroke="currentColor" stroke-width="2.2"/>
            </svg>
          </button>
          <div class="composer-actions">
            <label class="add-button" for="file-input" data-i18n-title="composer.addFile" data-i18n-aria-label="composer.addFile">
              <svg class="add-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
            </label>
            <input id="file-input" type="file" multiple hidden>
            <button id="send-button" class="send-button" type="submit" disabled data-i18n-title="composer.send" data-i18n-aria-label="composer.send">
              <svg class="send-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 19V5M6.5 10.5 12 5l5.5 5.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </form>
      </footer>
    </section>
  </main>
  <dialog id="media-viewer" class="media-viewer" data-i18n-aria-label="attachment.closePreview">
    <button id="media-viewer-close" class="media-viewer-close" type="button" data-i18n-title="attachment.closePreview" data-i18n-aria-label="attachment.closePreview">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6 6l12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <button id="media-viewer-previous" class="media-viewer-nav media-viewer-previous" type="button" data-i18n-title="attachment.previousMedia" data-i18n-aria-label="attachment.previousMedia">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div id="media-viewer-stage" class="media-viewer-stage"></div>
    <button id="media-viewer-next" class="media-viewer-nav media-viewer-next" type="button" data-i18n-title="attachment.nextMedia" data-i18n-aria-label="attachment.nextMedia">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span id="media-viewer-position" class="media-viewer-position" role="status" aria-live="polite"></span>
    <a id="media-viewer-system-open" class="media-viewer-system-open" href="" data-i18n-title="attachment.openWithSystem" data-i18n-aria-label="attachment.openWithSystem" hidden>
      <svg class="media-viewer-system-open-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 16V3m0 0L8 7m4-4 4 4M5 12v7h14v-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </dialog>
  <script src="/static/app.js" defer></script>
</body>
</html>
